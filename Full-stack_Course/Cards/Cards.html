<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards</title>
    <link rel="stylesheet" href="CardStyle.css">
</head>
<body>

    <div class="container">
        <div class="cards card1">
            <h2>Air Force One</h2>
            <img src="../../Images/AF1.jpg" alt="Nike Air Force 1 Sneakers">
            <h1>$349<span class="cents">.99</span></h1>
            <div class="btn-container">
            <button class="buy" id="buy">Buy</button>
            <button class="buy" id="add">
                <img src="../../Images/cart.png" class="cart" alt="">
                Add to cart
            </button>
            </div>
        </div>
        <div class="cards card2">
            <h2>Profile</h2>
        </div>
        <div class="cards card3">
            <h2>Call Now!</h2>
        </div>
        <div class="cards card4">
            <h2>Details</h2>
        </div>
    </div>
    
</body>
</html>
